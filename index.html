<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Integration</title>
</head>
<body>

<form id="form-init" action="https://forminit.com/api/forms/gkx9ia24mhn/submissions" method="POST">
    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <button type="submit">Submit</button>
</form>

<script>
    document.getElementById('form-init').addEventListener('submit', function(event) {
        event.preventDefault();
        const formData = new FormData(this);

        fetch(this.action, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            alert('Submission Successful!'); // success message
        })
        .catch(error => {
            alert('Submission Failed!'); // error message
        });
    });
</script>

</body>
</html>
