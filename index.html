<html>
<head>
    <title>SIR Telangana 2026 UIDAI Themed Form</title>
    <script>
        // JavaScript for dynamically populating districts and constituencies
        const districts = ["Adilabad", "Hyderabad", "Khammam", "Mahbubnagar", "Medak", "Nalgonda", "Nizamabad", "Rangareddy", "Secunderabad", "Wanaparthy", "Warangal", "Karimnagar"];
        function populateDistricts() {
            const districtSelect = document.getElementById('district');
            districts.forEach(district => {
                const option = document.createElement('option');
                option.value = district;
                option.text = district;
                districtSelect.appendChild(option);
            });
        }
    
        function populateConstituencies() {
            const constituencySelect = document.getElementById('constituency');
            // Logic to populate constituencies dynamically
            // E.g., based on selected district, either hardcoded or fetched from an endpoint
        }
    
        function init() {
            populateDistricts();
            // Add event listener for district change
            document.getElementById('district').addEventListener('change', populateConstituencies);
            // FormInit integration code goes here.
        }
    
        window.onload = init;
    </script>
</head>
<body>
    <h1>SIR Telangana 2026 UIDAI Themed Form</h1>
    <form>
        <h2>Personal & Authenticated Contact</h2>
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" required><br>
        <label for="aadhaarNumber">Aadhaar Number:</label>
        <input type="text" id="aadhaarNumber" required><br>
        <label for="mobileNumber">Aadhaar-Linked Mobile Number:</label>
        <input type="text" id="mobileNumber" required style="background-color: yellow;"><br>
        <label for="fathersName">Father's Name:</label>
        <input type="text" id="fathersName" required><br>
        <label for="mothersName">Mother's Name:</label>
        <input type="text" id="mothersName" required><br>
        <label for="husbandsName">Husband's Name:</label>
        <input type="text" id="husbandsName"><br>
        
        <h2>Electoral Geography</h2>
        <label for="district">District:</label>
        <select id="district" required></select><br>
        <label for="constituency">Assembly Constituency:</label>
        <select id="constituency" required></select><br>
        <label for="historicalConstituency">Historical Constituency:</label>
        <input type="text" id="historicalConstituency"><br>
        
        <h2>Issue Type & Documentation</h2>
        <label for="issueType">Primary Issue Category:</label>
        <input type="text" id="issueType" required><br>
        <label for="documentProof">Document Proof Selection:</label>
        <input type="file" id="documentProof" required><br>
        
        <input type="submit" value="Submit">
    </form>
</body>
</html>
