<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIDAI SIR 2026 Form</title>
</head>
<body>
    <form id="uidai-sir-form">
        <h1>UIDAI Themed SIR 2026 Form</h1>
        <section>
            <h2>Personal Contact</h2>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>
        </section>
        <section>
            <h2>Electoral Geography</h2>
            <label for="state">State:</label>
            <select id="state" name="state" required>
                <option value="">Select State</option>
                <!-- Options will be populated dynamically -->
            </select>
            <label for="district">District:</label>
            <select id="district" name="district" required>
                <option value="">Select District</option>
                <!-- Options will be populated dynamically -->
            </select>
            <label for="constituency">Constituency:</label>
            <select id="constituency" name="constituency" required>
                <option value="">Select Constituency</option>
                <!-- Options will be populated dynamically -->
            </select>
        </section>
        <section>
            <h2>Issue Type</h2>
            <label for="issue">Select Issue:</label>
            <select id="issue" name="issue" required>
                <option value="">Select Issue</option>
                <option value="complaint">Complaint</option>
                <option value="suggestion">Suggestion</option>
                <option value="query">Query</option>
            </select>
        </section>
        <button type="submit">Submit</button>
    </form>
    <script>
        // FormInit integration code
        const formId = 'gkx9ia24mhn';
        // Other FormInit logic...
    </script>
</body>
</html>
